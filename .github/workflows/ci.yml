name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Every 30 minutes — builds up history for Kleore to analyze
    - cron: "*/30 * * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
